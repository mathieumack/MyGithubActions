name: 'Nuget package'
description: 'Build and Deploy a .net library on nuget'
inputs:
  nugetPackageIdentifier:  # id of input
    description: 'Who to greet'
    required: true
    default: 'World'
  nugetApiKey:  # id of input
    description: 'Who to greet'
    required: true
    secrets: true
    default: 'World'
  sonarOrganizationCode:  # id of input
    description: 'Who to greet'
    required: true
    secrets: true
    default: 'World'
  sonarProjectCode:  # id of input
    description: 'Who to greet'
    required: true
    secrets: true
    default: 'World'
  sonarToken:  # id of input
    description: 'Who to greet'
    required: true
    secrets: true
    default: 'World'
  publishToNuget:  # id of input
    description: 'Who to greet'
    required: true
    default: 'World'
  githubToken:  # id of input
    description: 'Who to greet'
    required: true
    default: 'World'
outputs:
  BUILD_VERSION:
    description: 'The time we greeted you'
  BUILD_VERSION_PREFIX:
    description: 'The time we greeted you'
runs:
  using: "composite"
  steps:
  # Show informations :
  - uses: actions/checkout@v4
  - name: Show context information
    shell: bash
    run: |
      echo "Github Ref: ${{ github.ref }}"
      echo "Github Head Ref: ${{ github.head_ref }}"
      echo "Github Run number: ${{ github.run_number }}"
      echo "PR Number: ${{ github.event.pull_request.number }}"
  # Generate package version :
  - id: nugetVersion
    uses: ./nugetversion
    with:
      nugetPackageIdentifier: '${{ inputs.nugetPackageIdentifier }}'

  # Check if PR message requests build and package
  - name: Check PR message for build request
    id: check-pr-message
    if: github.event.pull_request.number != ''
    shell: pwsh
    run: |
      $prNumber = "${{ github.event.pull_request.number }}"
      $repo = "${{ github.repository }}"
      $token = "${{ inputs.githubToken }}"
      $scriptPath = "${{ github.workspace }}/actions/nugetversion/scripts/checkPRMessage.ps1"
      if (Test-Path $scriptPath) {
        $shouldPublish = & $scriptPath -prNumber $prNumber -repo $repo -token $token
        echo "pr_requests_publish=$shouldPublish" >> $GITHUB_OUTPUT
        echo "PR requests publish: $shouldPublish"
      } else {
        echo "pr_requests_publish=false" >> $GITHUB_OUTPUT
      }

  # Build solution (and package nuget)
  - id: buildAndTest
    uses: ./buildandtestdotnet
    with:
      version: '${{ steps.nugetVersion.outputs.buildVersion }}'
      prefix: '${{ steps.nugetVersion.outputs.buildVersionPrefix }}'
  - name: SonarCloud Scan
    uses: SonarSource/sonarcloud-github-action@master
    env:
      GITHUB_TOKEN: ${{ inputs.githubToken }}
      SONAR_TOKEN: ${{ inputs.sonarToken }}
  - uses: actions/upload-artifact@v3
    with:
      name: nuget-artifact
      path: src/**/*.nupkg
  # Publish a new version only for new features :
  - name: Push Package to NuGet.org
    shell: pwsh
    if: startswith(github.ref,'refs/heads/main') || startswith(github.ref,'refs/heads/feature') || startswith(github.head_ref,'feature/') || startswith(github.head_ref,'copilot/') || inputs.publishToNuget || steps.check-pr-message.outputs.pr_requests_publish == 'true'
    run: dotnet nuget push **.nupkg -k ${{ inputs.nugetApiKey }} -s https://api.nuget.org/v3/index.json
    working-directory: src
