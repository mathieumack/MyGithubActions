name: 'Nuget package'
description: 'Build and Deploy a .net library on nuget'
inputs:
  nugetPackageIdentifier:  # id of input
    description: 'NuGet package identifier to check and publish'
    required: true
  nugetApiKey:  # id of input
    description: 'NuGet.org API key for package publication'
    required: true
    secrets: true
  publishToNuget:  # id of input
    description: 'Force publish to NuGet.org (true/false)'
    required: false
    default: 'false'
  workingDirectory:
    description: 'Working directory that contains the source folder'
    required: false
    default: 'src'
  versionIncrement:
    description: 'Version increment type: major, minor, or patch'
    required: false
    default: 'minor'
outputs:
  BUILD_VERSION:
    description: 'Generated package version'
  BUILD_VERSION_PREFIX:
    description: 'Generated version prefix (e.g., -preview-001)'
runs:
  using: "composite"
  steps:
  # Show informations :
  - uses: actions/checkout@v4
  - name: Show github context github ref
    shell: bash
    run: echo Github Ref ${{ github.ref }}
  - name: Show github context github head ref
    shell: bash
    run: echo Github Head Ref ${{ github.head_ref }}
  - name: Show github context github run number
    shell: bash
    run: echo Github Run number ${{ github.run_number }}
  # Generate package version :
  - id: nugetVersion
    uses: ./nugetversion
    with:
      nugetPackageIdentifier: '${{ inputs.nugetPackageIdentifier }}'
      versionIncrement: '${{ inputs.versionIncrement }}'
  # Build solution (and package nuget) 
  - id: buildAndTest
    uses: ./buildandtestdotnet
    with:
      version: '${{ steps.nugetVersion.outputs.buildVersion }}'
      prefix: '${{ steps.nugetVersion.outputs.buildVersionPrefix }}'
      workingDirectory: '${{ inputs.workingDirectory }}'
  - uses: actions/upload-artifact@v4
    with:
      name: nuget-artifact
      path: ${{ inputs.workingDirectory }}/**/*.nupkg
  # Publish a new version only for new features :
  - name: Push Package to NuGet.org
    shell: pwsh
    if: startswith(github.ref,'refs/heads/main') || startswith(github.ref,'refs/heads/feature') || startswith(github.head_ref,'feature/') || inputs.publishToNuget
    run: dotnet nuget push **.nupkg -k ${{ inputs.nugetApiKey }} -s https://api.nuget.org/v3/index.json
    working-directory: ${{ inputs.workingDirectory }}