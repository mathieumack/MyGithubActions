name: .NET

on:
  workflow_call:
    inputs:
        publishToNuget:
          description: 'Publish to nuget'
          required: true
          default: true
          type: boolean
        sourceDirectoryPath:
          description: 'Path for all source code'
          default: 'src'
          type: string
        runOnImageName:
          description: 'Image target name (ubuntu, windows, ...)'
          default: 'ubuntu'
          type: string
        runOnImageVersion:
          description: 'Image target version (latest, 20.04, ...)'
          default: 'latest'
          type: string
        dotnet-version:
          description: 'Dotnet versions.'
          default: |
            9.0.x
          type: string
        addSupportForWindowsSdk:
          description: 'Add support for Windows SDK'
          default: false
          type: boolean
        windowsSdkVersion:
          description: 'Windows SDK version to install'
          default: '22100'
          type: string
    secrets:
        NUGETPACKAGEIDENTIFIER:
            required: true
        NUGETAPIKEY:
            required: true

jobs:
  build:
    name: "CI : Build, Test and publish"
    runs-on: '${{ inputs.runOnImageName }}-${{ inputs.runOnImageVersion }}'

    steps:
    - name: Checkout workflows repo # required so we can reference the actions locally
      uses: actions/checkout@v4

    # Show informations :
    - name: Show context information
      run: |
        echo "GitHub ref: ${{ github.ref }}"
        echo "GitHub head_ref: ${{ github.head_ref }}"
        echo "Publish to NuGet: ${{ inputs.publishToNuget }}"
        echo "PR Number: ${{ github.event.pull_request.number }}"

    # Check if PR message requests build and package
    - name: Check PR message for build request
      id: check-pr-message
      if: github.event.pull_request.number != ''
      shell: pwsh
      run: |
        $prNumber = "${{ github.event.pull_request.number }}"
        $repo = "${{ github.repository }}"
        $token = "${{ github.token }}"
        $scriptPath = "actions/nugetversion/scripts/checkPRMessage.ps1"
        if (Test-Path $scriptPath) {
          $shouldPublish = & $scriptPath -prNumber $prNumber -repo $repo -token $token
          echo "pr_requests_publish=$shouldPublish" >> $GITHUB_OUTPUT
          echo "PR requests publish: $shouldPublish"
        } else {
          Write-Host "Script not found at $scriptPath, skipping PR message check"
          echo "pr_requests_publish=false" >> $GITHUB_OUTPUT
        }

    # Install java last version for Sonar
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: 17
        distribution: 'zulu' # Alternative distribution options are available.
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: ${{ inputs.dotnet-version }}
    - name: Add support for Windows SDK
      if: ${{ inputs.addSupportForWindowsSdk }}
      uses: GuillaumeFalourd/setup-windows10-sdk-action@v2.4
      with:
        sdk-version: ${{ inputs.windowsSdkVersion }}
    - name: Restore dependencies
      shell: pwsh
      run: dotnet restore
      working-directory: ${{ inputs.sourceDirectoryPath }}

    - name: Generate build version
      id: generate-version
      uses: mathieumack/MyGithubActions/actions/nugetversion@copilot/fix-build-ci-dotnet-failed
      with:
        nugetPackageIdentifier: '${{ secrets.NUGETPACKAGEIDENTIFIER }}'

    - name: Build and test dotnet projects
      id: buildandanalyze
      uses: mathieumack/MyGithubActions/actions/buildandtestdotnet@copilot/fix-build-ci-dotnet-failed
      with:
        dotnet-version: ${{ inputs.dotnet-version }}
        version: '${{ steps.generate-version.outputs.buildversion }}'
        prefix: '${{ steps.generate-version.outputs.buildversionprefix }}'
        workingDirectory: '${{ inputs.sourceDirectoryPath }}'

    - uses: actions/upload-artifact@v4
      with:
        name: nuget-artifact
        path: src/**/*.nupkg
    # Publish a new version only for new features :
    - name: Push Package to NuGet.org
      if: startswith(github.ref,'refs/heads/main') || startswith(github.ref,'refs/heads/feature') || startswith(github.head_ref,'feature/') || startswith(github.head_ref,'copilot/') || inputs.publishToNuget || steps.check-pr-message.outputs.pr_requests_publish == 'true'
      run: dotnet nuget push **.nupkg -k ${{ secrets.NUGETAPIKEY }} -s https://api.nuget.org/v3/index.json
      working-directory: ${{ inputs.sourceDirectoryPath }}
