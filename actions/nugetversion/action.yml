name: 'Nuget package version'
description: 'Find and generate the version of the nuget package to build'
inputs:
  nugetPackageIdentifier:
    description: 'Package identifier that should be used to check for version'
    required: true
    default: 'World'
  feedUrl:
    description: 'Custom NuGet feed URL (optional, defaults to public NuGet)'
    required: false
    default: 'https://api-v2v3search-0.nuget.org'
outputs:
  buildversion:
    description: 'Generated build version (complete with preview suffix if applicable)'
    value: ${{ steps.generate-version.outputs.buildversion }}
runs:
  using: "composite"
  steps:
  - name: Generate package version
    id: generate-version
    shell: pwsh
    run: |
      # Determine if this is the main branch
      $isMainBranch = '${{ github.ref }}' -eq 'refs/heads/main'
      Write-Host "Current ref branch: ${{ github.ref }}"
      Write-Host "Is main branch: $isMainBranch"
      
      # Generate complete version (including preview suffix for non-main branches)
      $version = .\scripts\generateVersion.ps1 -query "${{ inputs.nugetPackageIdentifier }}" -feedUrl "${{ inputs.feedUrl }}" -isMainBranch $isMainBranch
      "buildversion=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
      Write-Host "Final build version: $version"
    working-directory: ${{ github.action_path }}
