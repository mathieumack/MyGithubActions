name: 'Nuget package version'
description: 'Find and generate the version of the nuget package to build'
inputs:
  nugetPackageIdentifier:
    description: 'Package identifier that should be used to check for version'
    required: true
    default: 'World'
  feedUrl:
    description: 'Custom NuGet feed URL (optional, defaults to public NuGet)'
    required: false
    default: 'https://api-v2v3search-0.nuget.org'
outputs:
  buildversion:
    description: 'Generated build version (complete with preview suffix if applicable)'
    value: ${{ steps.generate-version.outputs.buildversion }}
runs:
  using: "composite"
  steps:
  - name: Generate package version
    id: generate-version
    shell: pwsh
    run: |
      $version = .\scripts\generateVersion.ps1 -query "${{ inputs.nugetPackageIdentifier }}"
      "buildversion=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
      Write-Host "Build version : $version"
    working-directory: ${{ github.action_path }}
  - name: Generate package version prefix
    id: generate-version-prefix
    shell: pwsh
    run: |
      $versionPrefix = ""
      echo "Current ref branch : ${{ github.ref }}"
      if('${{ github.ref }}' -eq 'refs/heads/main')
      {
        $versionPrefix = ""
      }
      else {
        $baseVersion = "${{ steps.generate-version.outputs.buildversion }}"
        $query = "${{ inputs.nugetPackageIdentifier }}"
        
        $previewNumber = 1
        
        try {
          # Query NuGet for all versions of the package
          $response = Invoke-RestMethod -Uri "https://api-v2v3search-0.nuget.org/query?q=$query&skip=0&take=1" -ErrorAction Stop
          
          if ($response.data.Count -eq 1)
          {
            # Get all versions that match the base version with preview suffix
            $previewVersions = $response.data[0].versions | Where-Object { 
              $null -ne $_.version -and $_.version -like "$baseVersion-preview-*" 
            }
            
            if ($previewVersions.Count -gt 0)
            {
              # Extract preview numbers and find the max
              $previewNumbers = $previewVersions | ForEach-Object {
                if ($_.version -match "$baseVersion-preview-(\d+)")
                {
                  [int]$matches[1]
                }
              } | Where-Object { $_ -ne $null }
              
              if ($previewNumbers.Count -gt 0)
              {
                $maxPreviewNumber = ($previewNumbers | Measure-Object -Maximum).Maximum
                $previewNumber = $maxPreviewNumber + 1
              }
            }
            
            write-host "Found $($previewVersions.Count) existing preview version(s) for $baseVersion"
            write-host "Next preview number: $previewNumber"
          }
        }
        catch {
          write-host "Warning: Could not query NuGet API: $_"
          write-host "Defaulting to preview number 1"
        }
        
        $formattedPreviewNumber = $previewNumber.ToString("000")
        $versionPrefix = "-preview-" + $formattedPreviewNumber
      }
      "buildversionprefix=$versionPrefix" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
      Write-Host "Build version prefix: $versionPrefix"
